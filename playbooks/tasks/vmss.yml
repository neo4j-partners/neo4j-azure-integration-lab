---
- name: Build userAssignedIdentities dict
  ansible.builtin.set_fact:
    vmss_user_assigned_identities: "{{ {neo4j_identity_id: {}} }}"

- name: Create VM Scale Set with Neo4j marketplace image
  azure.azcollection.azure_rm_resource:
    resource_group: "{{ resource_group }}"
    provider: Compute
    resource_type: virtualMachineScaleSets
    resource_name: "{{ vmss_name }}"
    api_version: "2024-07-01"
    idempotency: true
    body:
      location: "{{ location }}"
      tags:
        Neo4jVersion: "{{ graph_database_version }}"
        Neo4jEdition: "{{ license_type }}"
        NodeCount: "{{ node_count | string }}"
        DeployedBy: ansible
        TemplateVersion: "1.0.0"
      identity:
        type: UserAssigned
        userAssignedIdentities: "{{ vmss_user_assigned_identities }}"
      plan:
        publisher: neo4j
        product: neo4j-ee-vm
        name: byol
      sku:
        name: "{{ vm_size }}"
        capacity: "{{ node_count | int }}"
      properties:
        overprovision: false
        upgradePolicy:
          mode: Manual
        virtualMachineProfile:
          storageProfile:
            osDisk:
              createOption: FromImage
            imageReference:
              publisher: Neo4j
              offer: neo4j-ee-vm
              sku: byol
              version: latest
            dataDisks:
              - lun: 0
                createOption: Empty
                managedDisk:
                  storageAccountType: Premium_LRS
                caching: None
                diskSizeGB: "{{ disk_size | int }}"
          osProfile:
            computerNamePrefix: node
            adminUsername: "{{ admin_username }}"
            adminPassword: "{{ admin_password }}"
            customData: "{{ cloud_init_base64 }}"
          networkProfile:
            networkInterfaceConfigurations:
              - name: nic
                properties:
                  primary: true
                  ipConfigurations:
                    - name: ipconfig-cluster
                      properties:
                        subnet:
                          id: "{{ neo4j_subnet_id }}"
                        publicIPAddressConfiguration:
                          name: public
                          properties:
                            idleTimeoutInMinutes: 30
                            dnsSettings:
                              domainNameLabel: "neo4j-{{ resource_suffix }}"
                        loadBalancerBackendAddressPools: "{{ [{'id': lb_backend_pool_id}] if (load_balancer_condition | bool) else [] }}"
          extensionProfile:
            extensions: []
  register: vmss_result

- name: Register VMSS facts
  ansible.builtin.set_fact:
    neo4j_vmss_id: "{{ vmss_result.response.id }}"
    neo4j_vmss_name: "{{ vmss_name }}"

- name: Print Neo4j deployment summary
  ansible.builtin.debug:
    msg:
      - "Neo4j deployment complete"
      - "Browser URL: http://vm000000.neo4j-{{ resource_suffix }}.{{ location }}.cloudapp.azure.com:7474"
      - "SSH: ssh {{ admin_username }}@vm000000.neo4j-{{ resource_suffix }}.{{ location }}.cloudapp.azure.com"
      - "Load Balancer private IP: {{ lb_private_ip if (load_balancer_condition | bool) else 'N/A (standalone)' }}"
      - "VMSS name: {{ neo4j_vmss_name }}"
      - "Node count: {{ node_count }}"
