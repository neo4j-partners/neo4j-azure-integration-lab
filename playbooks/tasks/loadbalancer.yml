---
- name: Create internal load balancer
  azure.azcollection.azure_rm_loadbalancer:
    resource_group: "{{ resource_group }}"
    name: "{{ lb_name }}"
    location: "{{ location }}"
    state: present
    sku: Standard
    frontend_ip_configurations:
      - name: lbipnew
        subnet: "{{ neo4j_subnet_id }}"
        private_ip_allocation_method: Dynamic
    backend_address_pools:
      - name: backend
    # All three LB rules share a single HTTP probe on port 7474. TCP probes on ports 7687/7688
    # were tried and removed: Neo4j completes the TCP handshake on 7687 before the Bolt banner,
    # so a raw TCP probe technically passes, but HTTP/7474 gives a cleaner health signal — all
    # three rules are gated on the same condition. With enable_tcp_reset: true on every rule,
    # a failed probe causes the LB to send TCP RST to clients rather than timing out silently.
    probes:
      - name: httpprobe
        protocol: Http
        port: 7474
        request_path: /
        interval: 5
        fail_count: 1
    load_balancing_rules:
      - name: inboundrule7474
        frontend_ip_configuration: lbipnew
        frontend_port: 7474
        backend_port: 7474
        protocol: Tcp
        backend_address_pool: backend
        probe: httpprobe
        idle_timeout: 4
        enable_floating_ip: false
        disable_outbound_snat: true
        enable_tcp_reset: true
      - name: inbound7687
        frontend_ip_configuration: lbipnew
        frontend_port: 7687
        backend_port: 7687
        protocol: Tcp
        backend_address_pool: backend
        probe: httpprobe
        idle_timeout: 4
        enable_floating_ip: false
        disable_outbound_snat: true
        enable_tcp_reset: true
      - name: inbound7688
        frontend_ip_configuration: lbipnew
        frontend_port: 7688
        backend_port: 7688
        protocol: Tcp
        backend_address_pool: backend
        probe: httpprobe
        idle_timeout: 4
        enable_floating_ip: false
        disable_outbound_snat: true
        enable_tcp_reset: true
  register: lb_result
  when: load_balancer_condition | bool

- name: Register load balancer facts
  ansible.builtin.set_fact:
    lb_backend_pool_id: "{{ lb_result.state.backend_address_pools[0].id }}"
    lb_private_ip: "{{ lb_result.state.frontend_ip_configurations[0].private_ip_address }}"
  when: load_balancer_condition | bool

- name: Set empty load balancer facts when load balancer is not deployed
  ansible.builtin.set_fact:
    lb_backend_pool_id: ""
    lb_private_ip: ""
  when: not (load_balancer_condition | bool)

# --- Private Link Service ---
# Fronts the ILB so Databricks serverless compute can reach Neo4j via a private endpoint.
# Serverless compute runs outside the customer VNet and has no route to private IPs —
# the only path is through an NCC PE rule pointing at this PLS. Created via azure_rm_resource
# (raw ARM) since azure.azcollection has no dedicated azure_rm_privatelinkservice module.
#
# visibility.subscriptions: ['*'] — demo only. In production, replace '*' with the Databricks
# platform subscription ID retrieved after the first setup-ncc run. See docs/ansible.md.
# autoApproval.subscriptions: [] — all PE connections require explicit approval via setup-ncc.

- name: Create Private Link Service
  azure.azcollection.azure_rm_resource:
    resource_group: "{{ resource_group }}"
    provider: Network
    resource_type: privateLinkServices
    resource_name: "{{ pls_name }}"
    api_version: "2024-07-01"
    idempotency: true
    body:
      location: "{{ location }}"
      properties:
        loadBalancerFrontendIpConfigurations:
          - id: "{{ lb_result.state.frontend_ip_configurations[0].id }}"
        ipConfigurations:
          - name: pls-nat-ip
            properties:
              subnet:
                id: "{{ neo4j_pls_subnet_id }}"
              privateIPAllocationMethod: Dynamic
              primary: true
        visibility:
          subscriptions:
            - "*"
        autoApproval:
          subscriptions: []
        enableProxyProtocol: false
  register: pls_result
  when: load_balancer_condition | bool

- name: Register PLS resource ID
  ansible.builtin.set_fact:
    neo4j_pls_resource_id: "{{ pls_result.response.id }}"
  when: load_balancer_condition | bool

- name: Set empty PLS resource ID when load balancer is not deployed
  ansible.builtin.set_fact:
    neo4j_pls_resource_id: ""
  when: not (load_balancer_condition | bool)
