---
- name: Compute resource suffix from resource group name
  ansible.builtin.set_fact:
    resource_suffix: "{{ (resource_group | hash('sha1'))[:13] }}"

- name: Create Neo4j network security group
  azure.azcollection.azure_rm_securitygroup:
    resource_group: "{{ resource_group }}"
    name: "{{ nsg_name }}"
    location: "{{ location }}"
    state: present
    purge_rules: true
    rules:
      - name: SSH
        description: SSH
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "22"
        source_address_prefix: "{{ ssh_source_cidr }}"
        destination_address_prefix: "*"
        access: Allow
        priority: 100
        direction: Inbound
      - name: HTTPS
        description: HTTPS
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "7473"
        source_address_prefix: Internet
        destination_address_prefix: "*"
        access: Allow
        priority: 101
        direction: Inbound
      - name: HTTP
        description: HTTP
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "7474"
        source_address_prefix: Internet
        destination_address_prefix: "*"
        access: Allow
        priority: 102
        direction: Inbound
      - name: Bolt
        description: Bolt
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "7687"
        source_address_prefix: Internet
        destination_address_prefix: "*"
        access: Allow
        priority: 103
        direction: Inbound
      - name: ClusterCommunication
        description: Cluster communication and transaction shipping (Neo4j 5.x)
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "6000"
        source_address_prefix: VirtualNetwork
        destination_address_prefix: VirtualNetwork
        access: Allow
        priority: 104
        direction: Inbound
      - name: ClusterRaft
        description: Raft consensus protocol (Neo4j 5.x)
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "7000"
        source_address_prefix: VirtualNetwork
        destination_address_prefix: VirtualNetwork
        access: Allow
        priority: 105
        direction: Inbound
      - name: BoltRouting
        description: Bolt routing connector for cluster-aware drivers
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "7688"
        source_address_prefix: Internet
        destination_address_prefix: "*"
        access: Allow
        priority: 106
        direction: Inbound
      # AzureLoadBalancerProbe must be present or the Standard ILB health probes cannot reach
      # the VMSS instances. If absent the LB marks all backends unhealthy and sends TCP RST to
      # all inbound connections (enable_tcp_reset: true on every LB rule). nsg_update.yml
      # explicitly re-adds this rule when it replaces the full ruleset during Databricks peering.
      - name: AzureLoadBalancerProbe
        protocol: Tcp
        source_port_range: "*"
        destination_port_range: "*"
        source_address_prefix: AzureLoadBalancer
        destination_address_prefix: "*"
        access: Allow
        priority: 110
        direction: Inbound
  register: nsg_result

- name: Register NSG facts
  ansible.builtin.set_fact:
    neo4j_nsg_id: "{{ nsg_result.state.id }}"
    neo4j_nsg_name: "{{ nsg_name }}"

- name: Create Neo4j virtual network
  azure.azcollection.azure_rm_virtualnetwork:
    resource_group: "{{ resource_group }}"
    name: "{{ vnet_name }}"
    location: "{{ location }}"
    address_prefixes_cidr:
      - "10.0.0.0/8"
    state: present
  register: vnet_result

- name: Create Neo4j subnet
  azure.azcollection.azure_rm_subnet:
    resource_group: "{{ resource_group }}"
    virtual_network_name: "{{ vnet_name }}"
    name: subnet
    address_prefix_cidr: "10.0.0.0/16"
    security_group: "{{ nsg_name }}"
    state: present

- name: Register VNet and subnet facts
  ansible.builtin.set_fact:
    neo4j_vnet_id: "{{ vnet_result.state.id }}"
    neo4j_subnet_id: "/subscriptions/{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ vnet_name }}/subnets/subnet"

# --- PLS subnet (Private Link Service NAT IPs) ---
# Only needed for cluster deployments (node_count >= 3) where the ILB + PLS are deployed.
# load_balancer_condition is not yet computed when this task file runs, so we evaluate
# (node_count | int) >= 3 directly — it is the same condition.
#
# Azure requires privateLinkServiceNetworkPolicies: Disabled on the NAT subnet before a
# Private Link Service can be created there. azure_rm_subnet does not expose this property
# consistently across all collection versions, so a two-step approach is used: create the
# subnet first, then update via azure_rm_resource to set the policy.
#
# 10.1.0.0/28 is within the VNet /8 address space but outside the main /16 to avoid overlap.
# The /28 provides 11 usable addresses — Azure recommends ≥8 NAT IPs for PLS capacity.

- name: Create PLS subnet
  azure.azcollection.azure_rm_subnet:
    resource_group: "{{ resource_group }}"
    virtual_network_name: "{{ vnet_name }}"
    name: pls-subnet
    address_prefix_cidr: "10.1.0.0/28"
    state: present
  when: (node_count | int) >= 3

- name: Disable network policies on pls-subnet
  azure.azcollection.azure_rm_resource:
    resource_group: "{{ resource_group }}"
    provider: Network
    resource_type: virtualNetworks
    resource_name: "{{ vnet_name }}"
    subresource:
      - type: subnets
        name: pls-subnet
    api_version: "2023-11-01"
    idempotency: false
    body:
      properties:
        addressPrefix: "10.1.0.0/28"
        privateLinkServiceNetworkPolicies: Disabled
  when: (node_count | int) >= 3

- name: Register PLS subnet ID
  ansible.builtin.set_fact:
    neo4j_pls_subnet_id: "/subscriptions/{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}/resourceGroups/{{ resource_group }}/providers/Microsoft.Network/virtualNetworks/{{ vnet_name }}/subnets/pls-subnet"
  when: (node_count | int) >= 3

- name: Set empty PLS subnet ID for standalone deployments
  ansible.builtin.set_fact:
    neo4j_pls_subnet_id: ""
  when: (node_count | int) < 3
