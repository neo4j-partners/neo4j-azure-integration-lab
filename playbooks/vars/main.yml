---
# Neo4j deployment variables
# Override required values at runtime: -e resource_group=... -e location=... -e admin_password=...

admin_username: neo4j
admin_password: ""                # required at runtime
vm_size: Standard_D2s_v5
node_count: 1
disk_size: 32
graph_database_version: "2025"
license_type: Enterprise          # Enterprise | Evaluation
location: ""                      # required at runtime
oidc_config: "none"
resource_group: ""                # required at runtime
ssh_source_cidr: Internet         # restrict to a known CIDR for production (e.g. 203.0.113.0/24)
public_ip_enabled: true           # set to false for clusters where the LB is the only entry point
enable_http: true                 # set to false to serve the browser exclusively over HTTPS (7473)

# Resource naming (mirrors Bicep convention; resource_suffix is computed at runtime)
nsg_name: "nsg-neo4j-{{ location }}-{{ resource_suffix }}"
vnet_name: "vnet-neo4j-{{ location }}-{{ resource_suffix }}"
identity_name: "usermanaged-neo4j-{{ location }}-{{ resource_suffix }}"
lb_name: "lb-neo4j-{{ location }}-{{ resource_suffix }}"
vmss_name: "vmss-neo4j-{{ location }}-{{ resource_suffix }}"
